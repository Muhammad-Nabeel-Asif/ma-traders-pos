name: Build & Release Windows Installer

# Builds the MA Traders Windows .exe and publishes it as the "latest" release.
# Triggers:
#   - Automatically on every push to main (new code => new version => new .exe)
#   - Manually from the GitHub "Actions" tab (Run workflow)
#
# Permanent download link for the newest installer (share this with the user):
#   https://github.com/<owner>/<repo>/releases/latest/download/MA-Traders-Setup.exe
on:
  push:
    branches: [main]
  workflow_dispatch:

# allow the workflow to create tags and releases
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Derive version from build number
        shell: bash
        run: |
          VERSION="0.1.${{ github.run_number }}"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Building version $VERSION"

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Build Windows installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MA-Traders-Windows-Installer
          path: release/*.exe
          if-no-files-found: error

      - name: Publish "latest" GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: MA Traders v${{ env.APP_VERSION }}
          make_latest: true
          files: |
            release/*.exe
            release/*.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
